server {
    listen       80;
    server_name  _;

    root   /usr/share/nginx/html;
    index  index.html;

    # Compress text assets on the fly
    gzip            on;
    gzip_vary       on;
    gzip_min_length 1024;
    gzip_types      text/plain text/css application/javascript application/json image/svg+xml;

    # Vite emits content-hashed filenames under /assets, so they can be
    # cached forever. A new build produces new hashes.
    location /assets/ {
        expires    1y;
        add_header Cache-Control "public, immutable";
        try_files  $uri =404;
    }

    # index.html must never be cached, so clients always get the newest
    # build that points at the current hashed assets.
    location = /index.html {
        add_header Cache-Control "no-cache";
    }

    # SPA fallback: react-router handles routing client-side, so any
    # unknown path should return index.html instead of a 404.
    location / {
        try_files $uri $uri/ /index.html;
    }
}
